<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Customer Agent</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.2);
}

h1{
color:#0077ff;
}

textarea{
width:100%;
height:120px;
padding:10px;
margin-top:15px;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:18px;
background:#0077ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#reply{
margin-top:20px;
padding:15px;
background:#eef6ff;
border-radius:8px;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">
<h1>🤖 AI Customer Agent</h1>

<p>Welcome USA & Canada Customers</p>

<textarea id="question" placeholder="Ask your question here..."></textarea>

<br>

<button onclick="reply()">Send</button>

<div id="reply"></div>

</div>

<script>
function reply(){

let q=document.getElementById("question").value;

if(q==""){
document.getElementById("reply").innerHTML="Please enter a question.";
return;
}

document.getElementById("reply").innerHTML=
"<b>AI Reply:</b><br>Thanks for contacting us! Our team will reply shortly. Your question was:<br><br>"+q;

}
</script>

</body>
</html>
